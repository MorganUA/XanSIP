name: CI

on:
  push:
    branches: [main, "cursor/**", "feature/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Syntax check
        run: python -m compileall -q services api bot db core scripts tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker compose build api
      - name: Pytest (API container)
        run: docker compose run --rm --no-deps -e SKIP_WEB_ACCOUNT_SEED=1 api python -m pytest tests/ -q --tb=short

  qa-gate-unit:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: QA/TA gate (unit only)
        run: python scripts/qa_ta_gate.py --unit-only --skip-bot-import
